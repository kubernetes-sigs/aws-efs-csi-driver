iam:
  vpcResourceControllerPolicy: true
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: efs-csi-node-sa
        namespace: kube-system
      wellKnownPolicies:
        efsCSIController: true
      attachPolicyARNs:
      - "arn:aws:iam::aws:policy/service-role/AmazonS3FilesCSIDriverPolicy"
    - metadata:
        name: efs-csi-controller-sa
        namespace: kube-system
      wellKnownPolicies:
        efsCSIController: true
      attachPolicyARNs:
      - "arn:aws:iam::aws:policy/service-role/AmazonS3FilesCSIDriverPolicy"
