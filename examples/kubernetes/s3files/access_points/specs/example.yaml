kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: s3files-sc
provisioner: efs.csi.aws.com
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: s3files-pv1
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: s3files-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: s3files:fs-e8a95a42::fsap-068c22f0246419f75
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: s3files-pv2
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: s3files-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: s3files:fs-e8a95a42::fsap-19f752f0068c22464
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: s3files-claim1
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: s3files-sc
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: s3files-claim2
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: s3files-sc
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: s3files-app
spec:
  containers:
  - name: app
    image: rockylinux:8
    command: ["/bin/sh"]
    args: ["-c", "while true; do echo $(date -u) >> /data-dir1/out.txt; sleep 5; done"]
    volumeMounts:
    - name: s3files-volume-1
      mountPath: /data-dir1
    - name: s3files-volume-2
      mountPath: /data-dir2
  volumes:
  - name: s3files-volume-1
    persistentVolumeClaim:
      claimName: s3files-claim1
  - name: s3files-volume-2
    persistentVolumeClaim:
      claimName: s3files-claim2
